name: Build Historic

on:
  workflow_dispatch:
    inputs:
      sha:
        description: "Git commit SHA to build images from"
        required: true
        type: string
      image_filter:
        description: "Image name to build (e.g. redis, postgresql, mariadb)"
        required: true
        type: string

permissions:
  packages: write
  contents: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      has_builds: ${{ steps.gen.outputs.has_builds }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: gen
        run: |
          sha="${{ inputs.sha }}"
          filter="${{ inputs.image_filter }}"

          # Only look at Dockerfiles changed in the target commit
          dockerfiles=$(git diff-tree --no-commit-id --name-only -r "$sha" | grep '/Dockerfile$')

          lines=""
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            info=$(git log -1 --format='%s %at' "$sha" -- "$f")
            parsed=$(echo "$info" | sed -n 's/.*\[\(bitnami\/\)\?\([^]]*\)\] Release \([^ ]*\) (.* \([0-9]*\)$/\2 \3 \4/p')
            [ -n "$parsed" ] && lines="${lines:+$lines
          }$f $parsed"
          done <<EOF
          $dockerfiles
          EOF

          if [ -n "$filter" ]; then
            lines=$(echo "$lines" | awk '$2 == "'"$filter"'"')
          fi

          if [ -z "$lines" ]; then
            echo "has_builds=false" >> "$GITHUB_OUTPUT"
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
          else
            matrix=$(echo "$lines" | awk '{gsub(/\/Dockerfile$/,"",$1); printf "{\"name\":\"%s\",\"tag\":\"%s\",\"context\":\"%s\"}\n",$2,$3,$1}' | jq -sc '{include:.}')
            echo "has_builds=true" >> "$GITHUB_OUTPUT"
            echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: detect
    if: needs.detect.outputs.has_builds == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}:${{ matrix.tag }}

  index:
    needs: [detect, build]
    if: always() && needs.detect.outputs.has_builds == 'true'
    uses: ./.github/workflows/index.yml
    permissions:
      packages: read
      contents: write
