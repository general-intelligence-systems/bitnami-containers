name: Build Historic

on:
  workflow_dispatch:
    inputs:
      image:
        description: "Image to build (e.g. cloudnative-pg:1.27.0-debian-12-r1)"
        required: true
        type: string

permissions:
  packages: write
  contents: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      has_builds: ${{ steps.gen.outputs.has_builds }}
      sha: ${{ steps.resolve.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: resolve
        run: |
          sha=$(./bin/image-sha "${{ inputs.image }}")
          if [ -z "$sha" ]; then
            echo "::error::Could not find commit for ${{ inputs.image }}"
            exit 1
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "Resolved ${{ inputs.image }} -> $sha"

      - id: gen
        run: |
          sha="${{ steps.resolve.outputs.sha }}"
          lines=$(./bin/dockerfile-commits "$sha")

          name="${{ inputs.image }}"
          name="${name%%:*}"
          lines=$(echo "$lines" | awk '$2 == "'"$name"'"')

          if [ -z "$lines" ]; then
            echo "has_builds=false" >> "$GITHUB_OUTPUT"
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
          else
            matrix=$(echo "$lines" | awk '{gsub(/\/Dockerfile$/,"",$1); printf "{\"name\":\"%s\",\"tag\":\"%s\",\"context\":\"%s\"}\n",$2,$3,$1}' | jq -sc '{include:.}')
            echo "has_builds=true" >> "$GITHUB_OUTPUT"
            echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: detect
    if: needs.detect.outputs.has_builds == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.detect.outputs.sha }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}:${{ matrix.tag }}

  index:
    needs: [detect, build]
    if: always() && needs.detect.outputs.has_builds == 'true'
    uses: ./.github/workflows/index.yml
    permissions:
      packages: read
      contents: write
