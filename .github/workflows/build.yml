name: Build

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      build_all:
        description: "Build all images (true) or only recent (false)"
        required: false
        type: boolean
        default: false

permissions:
  packages: write
  contents: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      has_builds: ${{ steps.gen.outputs.has_builds }}
      items: ${{ steps.gen.outputs.items }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - id: gen
        run: |
          build_all="${{ inputs.build_all }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            build_all="true"
          fi

          cutoff=0
          if [ "$build_all" != "true" ]; then
            cutoff=$(date -u -d '25 hours ago' +%s)
          fi

          items=$(git ls-files '*/Dockerfile' | while read f; do
            commit_epoch=$(git log -1 --format=%at -- "$f")
            if [ "$commit_epoch" -gt "$cutoff" ]; then
              line=$(git log -1 --format=%s -- "$f")
              parsed=$(echo "$line" | sed -n 's/.*\[\(bitnami\/\)\?\([^]]*\)\] Release \([^ ]*\) (.*/\2 \3/p')
              if [ -n "$parsed" ]; then
                name=$(echo "$parsed" | cut -d' ' -f1)
                tag=$(echo "$parsed" | cut -d' ' -f2)
                context=$(dirname "$f")
                printf '{"name":"%s","tag":"%s","context":"%s"}\n' "$name" "$tag" "$context"
              fi
            fi
          done)

          if [ -z "$items" ]; then
            echo "has_builds=false" >> "$GITHUB_OUTPUT"
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            echo 'items=[]' >> "$GITHUB_OUTPUT"
          else
            matrix=$(echo "$items" | jq -sc '{"include":.}')
            items_json=$(echo "$items" | jq -sc '.')
            echo "has_builds=true" >> "$GITHUB_OUTPUT"
            echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
            echo "items=$items_json" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: detect
    if: needs.detect.outputs.has_builds == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}:${{ matrix.tag }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}:latest

  index:
    needs: [detect, build]
    if: always() && needs.detect.outputs.has_builds == 'true'
    uses: ./.github/workflows/index.yml
    with:
      items: ${{ needs.detect.outputs.items }}
    permissions:
      contents: write
