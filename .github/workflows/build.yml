name: Build

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      build_all:
        description: "Build all images (true) or only recent (false)"
        required: false
        type: boolean
        default: false

permissions:
  packages: write
  contents: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      has_builds: ${{ steps.gen.outputs.has_builds }}
      items: ${{ steps.gen.outputs.items }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - id: gen
        run: |
          cutoff=0
          if [ "${{ inputs.build_all || github.event_name == 'workflow_dispatch' }}" != "true" ]; then
            cutoff=$(date -u -d '25 hours ago' +%s)
          fi

          items=$(git ls-files '*/Dockerfile' | while read f; do
            if [ "$cutoff" -eq 0 ] || [ "$(git log -1 --format=%at -- "$f")" -gt "$cutoff" ]; then
              parsed=$(git log -1 --format=%s -- "$f" | sed -n 's/.*\[\(bitnami\/\)\?\([^]]*\)\] Release \([^ ]*\) (.*/\2 \3/p')
              if [ -n "$parsed" ]; then
                printf '{"name":"%s","tag":"%s","context":"%s"}\n' \
                  "$(echo "$parsed" | cut -d' ' -f1)" \
                  "$(echo "$parsed" | cut -d' ' -f2)" \
                  "$(dirname "$f")"
              fi
            fi
          done)

          if [ -z "$items" ]; then
            echo "has_builds=false" >> "$GITHUB_OUTPUT"
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            echo 'items=[]' >> "$GITHUB_OUTPUT"
          else
            echo "has_builds=true" >> "$GITHUB_OUTPUT"
            echo "matrix=$(echo "$items" | jq -sc '{"include":.}')" >> "$GITHUB_OUTPUT"
            echo "items=$(echo "$items" | jq -sc '.')" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: detect
    if: needs.detect.outputs.has_builds == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}:${{ matrix.tag }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}:latest

  index:
    needs: [detect, build]
    if: always() && needs.detect.outputs.has_builds == 'true'
    uses: ./.github/workflows/index.yml
    with:
      items: ${{ needs.detect.outputs.items }}
    permissions:
      contents: write
