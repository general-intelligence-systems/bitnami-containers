name: Index

on:
  workflow_call:
    inputs:
      items:
        description: "JSON array of {name, tag} objects"
        required: true
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate README.md
        env:
          ITEMS: ${{ inputs.items }}
        run: |
          owner="${{ github.repository_owner }}"

          cat > README.md << 'EOF'
          # Container Images

          Auto-generated index of all container images published to GHCR.

          ## Images

          | Image | Tag | Pull Command |
          |-------|-----|--------------|
          EOF
          sed -i 's/^          //' README.md

          echo "$ITEMS" | jq -r '.[] | "| \(.name) | `\(.tag)` | `docker pull ghcr.io/'"$owner"'/\(.name):\(.tag)` |"' >> README.md

          echo "" >> README.md
          echo "_Last updated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')_" >> README.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if ! git diff --cached --quiet; then
            git commit -m "chore: update image index"
            git push
          else
            echo "README unchanged, skipping commit"
          fi
