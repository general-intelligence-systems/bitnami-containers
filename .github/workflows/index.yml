name: Index

on:
  workflow_dispatch:
  workflow_call:

permissions:
  packages: read
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch packages from GHCR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
        run: |
          type=$(gh api "/users/$OWNER" --jq '.type')
          if [ "$type" = "Organization" ]; then
            prefix="/orgs/$OWNER"
          else
            prefix="/users/$OWNER"
          fi

          gh api --paginate "$prefix/packages?package_type=container" --jq '.[].name' | sort | while read name; do
            tags=$(gh api --paginate "$prefix/packages/container/$(echo "$name" | sed 's|/|%2F|g')/versions" --jq '.[].metadata.container.tags[]' 2>/dev/null | head -10 | tr '\n' ',' | sed 's/,$//')
            [ -n "$tags" ] && echo "$name|$tags"
          done > packages.dat

      - name: Render README.md
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          ./bin/render-index
          rm -f packages.dat

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if ! git diff --cached --quiet; then
            git commit -m "chore: update image index"
            git push
          else
            echo "README unchanged, skipping commit"
          fi
