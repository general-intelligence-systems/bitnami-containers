name: Index

on:
  workflow_dispatch:
  workflow_call:

permissions:
  packages: read
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate README.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
        run: |
          ruby -rerb -rjson -e '
            owner = ENV["OWNER"]
            raw = `gh api --paginate "/users/#{owner}/packages?package_type=container" 2>/dev/null`
            pkgs = JSON.parse(raw)
            packages = pkgs.map { |p|
              name = p["name"]
              versions = `gh api --paginate "/users/#{owner}/packages/container/#{name.gsub("/","%2F")}/versions" 2>/dev/null`
              tags = JSON.parse(versions).flat_map { |v| v.dig("metadata","container","tags") || [] }
              next if tags.empty?
              { name: name, tags: tags.first(10).join(", "), latest: tags.first }
            }.compact.sort_by { |p| p[:name] }

            template = File.read("README.md.erb")
            result = ERB.new(template, trim_mode: "-").result(binding)
            File.write("README.md", result)
          '

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if ! git diff --cached --quiet; then
            git commit -m "chore: update image index"
            git push
          else
            echo "README unchanged, skipping commit"
          fi
