name: Index

on:
  workflow_dispatch:
  workflow_call:

permissions:
  packages: read
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate README.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          owner="${{ github.repository_owner }}"

          cat > README.md << 'EOF'
          # Container Images

          | Image | Tags | Pull |
          |-------|------|------|
          EOF
          sed -i 's/^          //' README.md

          gh api --paginate "/users/$owner/packages?package_type=container" --jq '.[].name' | sort | while read pkg; do
            tags=$(gh api --paginate "/users/$owner/packages/container/$(echo "$pkg" | sed 's|/|%2F|g')/versions" --jq '.[].metadata.container.tags[]' 2>/dev/null | head -10 | tr '\n' ', ' | sed 's/,$//')
            [ -z "$tags" ] && continue
            latest=$(echo "$tags" | cut -d',' -f1 | xargs)
            echo "| $pkg | \`$tags\` | \`docker pull ghcr.io/$owner/$pkg:$latest\` |" >> README.md
          done

          echo "" >> README.md
          echo "_Last updated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')_" >> README.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if ! git diff --cached --quiet; then
            git commit -m "chore: update image index"
            git push
          else
            echo "README unchanged, skipping commit"
          fi
