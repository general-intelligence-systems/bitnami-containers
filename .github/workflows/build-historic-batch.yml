name: Build Historic Batch

on:
  workflow_dispatch:
    inputs:
      batch:
        description: "Path to batch file (e.g. data/batches/batch-000)"
        required: true
        type: string

permissions:
  packages: write
  contents: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.read.outputs.images }}
      has_images: ${{ steps.read.outputs.has_images }}
    steps:
      - uses: actions/checkout@v4

      - id: read
        run: |
          batch="${{ inputs.batch }}"

          if [ ! -f "$batch" ]; then
            echo "::error::Batch file not found: $batch"
            exit 1
          fi

          images=$(jq -R -s -c 'split("\n") | map(select(. != ""))' < "$batch")
          count=$(echo "$images" | jq 'length')

          echo "Batch $batch: found $count images"

          if [ "$count" -eq 0 ]; then
            echo "has_images=false" >> "$GITHUB_OUTPUT"
            echo "images=[]" >> "$GITHUB_OUTPUT"
          else
            echo "has_images=true" >> "$GITHUB_OUTPUT"
            echo "images=$images" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: detect
    if: needs.detect.outputs.has_images == 'true'
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        image: ${{ fromJSON(needs.detect.outputs.images) }}
    uses: ./.github/workflows/build-historic.yml
    with:
      image: ${{ matrix.image }}
    permissions:
      packages: write
      contents: write
