name: Build Historic Batch

on:
  workflow_dispatch:
    inputs:
      group:
        description: "Group number (1-48). Each group builds 256 images."
        required: true
        type: number

permissions:
  packages: write
  contents: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.slice.outputs.images }}
      has_images: ${{ steps.slice.outputs.has_images }}
    steps:
      - uses: actions/checkout@v4

      - id: slice
        run: |
          group=${{ inputs.group }}
          start=$(( (group - 1) * 256 + 1 ))
          end=$(( group * 256 ))

          images=$(sed -n "${start},${end}p" data/last-12-month-images.txt | jq -R -s -c 'split("\n") | map(select(. != ""))')
          count=$(echo "$images" | jq 'length')

          echo "Group $group: lines $start-$end, found $count images"

          if [ "$count" -eq 0 ]; then
            echo "has_images=false" >> "$GITHUB_OUTPUT"
            echo "images=[]" >> "$GITHUB_OUTPUT"
          else
            echo "has_images=true" >> "$GITHUB_OUTPUT"
            echo "images=$images" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: detect
    if: needs.detect.outputs.has_images == 'true'
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        image: ${{ fromJSON(needs.detect.outputs.images) }}
    uses: ./.github/workflows/build-historic.yml
    with:
      image: ${{ matrix.image }}
    permissions:
      packages: write
      contents: write
