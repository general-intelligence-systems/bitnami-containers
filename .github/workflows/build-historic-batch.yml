name: Build Historic Batch

on:
  workflow_dispatch:
    inputs:
      batch:
        description: "Path to batch file (e.g. data/batches/batch-000)"
        required: true
        type: string

permissions:
  packages: write
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.read.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: read
        run: |
          echo "matrix=$(jq -R -s -c 'split("\n") | map(select(. != ""))' < "${{ inputs.batch }}")" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    uses: ./.github/workflows/build-historic.yml
    with:
      image: ${{ matrix.image }}
    permissions:
      packages: write
      contents: write
