name: Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write
  packages: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync fork with upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          result=$(gh api \
            -X POST \
            /repos/${{ github.repository }}/merge-upstream \
            -f branch=main 2>&1) || true
          echo "$result"

  build:
    needs: sync
    uses: ./.github/workflows/build.yml
    with:
      build_all: false
    permissions:
      packages: write
      contents: write
